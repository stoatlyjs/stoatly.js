name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # stoat.js requires Node >=22.15.0 (LTS) in ES module mode.
        # Test the exact floor plus the latest release line.
        node-version: ["22.15.0", "22.x", "24.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm run lint
      - run: npm test
